<div class="max-w-lg mx-auto py-16 px-6">
  <h2 class="text-3xl font-bold text-center mb-8">Contact Us</h2>
  <form class="bg-white p-8 rounded-xl shadow-md border border-gray-200">
    <div class="mb-4">
      <label class="block text-sm font-medium text-gray-700">Name</label>
      <input type="text" class="mt-1 block w-full border border-gray-300 rounded-md p-2 focus:ring-blue-500 focus:border-blue-500">
    </div>
    <div class="mb-4">
      <label class="block text-sm font-medium text-gray-700">Email</label>
      <input type="email" class="mt-1 block w-full border border-gray-300 rounded-md p-2 focus:ring-blue-500 focus:border-blue-500">
    </div>
    <div class="mb-6">
      <label class="block text-sm font-medium text-gray-700">Message</label>
      <textarea rows="4" class="mt-1 block w-full border border-gray-300 rounded-md p-2 focus:ring-blue-500 focus:border-blue-500"></textarea>
    </div>
    <button class="w-full bg-blue-600 text-white font-bold py-2 rounded-md hover:bg-blue-700">
      Send Message
    </button>
  </form>
</div>
