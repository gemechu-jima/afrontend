 <div class="bg-slate-900/50 p-4 border border-slate-800 rounded-2xl flex flex-col md:flex-row gap-4 items-center justify-between">
    <div class="w-full md:w-96 relative">
      <input type="text" 
             [ngModel]="searchQuery()"
             (ngModelChange)="searchChange.emit($event)"
             placeholder="Search by name, role, email..." 
             class="w-full bg-slate-950 border border-slate-700 rounded-xl px-4 py-2 text-sm text-slate-100 placeholder-slate-500 focus:outline-none focus:border-indigo-500 transition">
    </div>
    
    <div class="flex items-center space-x-3 w-full md:w-auto">
      <label class="text-xs text-slate-400 font-semibold uppercase">Dept:</label>
      <select [ngModel]="selectedDepartment()"
              (ngModelChange)="departmentChange.emit($event)"
              class="bg-slate-950 border border-slate-700 rounded-xl px-4 py-2 text-sm text-slate-200 focus:outline-none focus:border-indigo-500 transition cursor-pointer w-full md:w-48">
        @for (dept of departments(); track dept) {
          <option [value]="dept">{{ dept }}</option>
        }
      </select>
    </div>
  </div>
