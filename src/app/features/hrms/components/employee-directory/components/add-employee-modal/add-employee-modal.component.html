@if (isOpen) {
  <div class="fixed inset-0 z-50 flex items-center justify-center bg-black/70 backdrop-blur-sm p-4 animate-fade-in">
    <div class="bg-slate-900 border border-slate-800 rounded-2xl w-full max-w-lg overflow-hidden shadow-2xl relative">
      <div class="px-6 py-4 border-b border-slate-800 flex justify-between items-center bg-slate-950/40">
        <h3 class="font-bold text-white text-lg">Onboard New Employee</h3>
        <button (click)="closeModal()" class="text-slate-400 hover:text-white text-xl font-bold">×</button>
      </div>
      
      <form (ngSubmit)="saveEmployee()" class="p-6 space-y-4">
        <div class="grid grid-cols-2 gap-4">
          <div class="col-span-2">
            <label class="block text-xs font-semibold text-slate-400 uppercase mb-1">Full Name *</label>
            <input type="text" 
                   [(ngModel)]="newEmployee.name" 
                   name="name" 
                   required
                   class="w-full bg-slate-950 border border-slate-700 rounded-xl px-4 py-2.5 text-sm text-slate-100 placeholder-slate-600 focus:outline-none focus:border-indigo-500">
          </div>

          <div class="col-span-2">
            <label class="block text-xs font-semibold text-slate-400 uppercase mb-1">Work Email Address *</label>
            <input type="email" 
                   [(ngModel)]="newEmployee.email" 
                   name="email" 
                   required
                   class="w-full bg-slate-950 border border-slate-700 rounded-xl px-4 py-2.5 text-sm text-slate-100 placeholder-slate-600 focus:outline-none focus:border-indigo-500">
          </div>

          <div>
            <label class="block text-xs font-semibold text-slate-400 uppercase mb-1">Role / Designation *</label>
            <input type="text" 
                   [(ngModel)]="newEmployee.role" 
                   name="role" 
                   required
                   placeholder="e.g. Frontend Developer"
                   class="w-full bg-slate-950 border border-slate-700 rounded-xl px-4 py-2.5 text-sm text-slate-100 placeholder-slate-600 focus:outline-none focus:border-indigo-500">
          </div>

          <div>
            <label class="block text-xs font-semibold text-slate-400 uppercase mb-1">Department</label>
            <select [(ngModel)]="newEmployee.department" 
                    name="department" 
                    class="w-full bg-slate-950 border border-slate-700 rounded-xl px-4 py-2.5 text-sm text-slate-200 focus:outline-none focus:border-indigo-500 cursor-pointer">
              @for (d of departments; track d) {
                @if (d !== 'All') {
                  <option [value]="d">{{ d }}</option>
                }
              }
            </select>
          </div>

          <div>
            <label class="block text-xs font-semibold text-slate-400 uppercase mb-1">Base Salary ($ / year)</label>
            <input type="number" 
                   [(ngModel)]="newEmployee.salary" 
                   name="salary" 
                   class="w-full bg-slate-950 border border-slate-700 rounded-xl px-4 py-2.5 text-sm text-slate-100 focus:outline-none focus:border-indigo-500">
          </div>

          <div>
            <label class="block text-xs font-semibold text-slate-400 uppercase mb-1">Join Date</label>
            <input type="date" 
                   [(ngModel)]="newEmployee.joinDate" 
                   name="joinDate" 
                   class="w-full bg-slate-950 border border-slate-700 rounded-xl px-4 py-2.5 text-sm text-slate-100 focus:outline-none focus:border-indigo-500">
          </div>
        
          <div class="col-span-2">
            <label class="block text-xs font-semibold text-slate-400 uppercase mb-1">Work Mode Status</label>
            <div class="grid grid-cols-3 gap-2">
              <button type="button" 
                      (click)="newEmployee.status = 'Active'"
                      [class.bg-indigo-600]="newEmployee.status === 'Active'"
                      [class.border-indigo-600]="newEmployee.status === 'Active'"
                      [class.text-white]="newEmployee.status === 'Active'"
                      class="bg-slate-950 border border-slate-700 text-slate-300 py-2 rounded-xl text-xs font-semibold transition hover:bg-slate-800">
                Active (Onsite)
              </button>
              <button type="button" 
                      (click)="newEmployee.status = 'Remote'"
                      [class.bg-indigo-600]="newEmployee.status === 'Remote'"
                      [class.border-indigo-600]="newEmployee.status === 'Remote'"
                      [class.text-white]="newEmployee.status === 'Remote'"
                      class="bg-slate-950 border border-slate-700 text-slate-300 py-2 rounded-xl text-xs font-semibold transition hover:bg-slate-800">
                Remote
              </button>
              <button type="button" 
                      (click)="newEmployee.status = 'On Leave'"
                      [class.bg-indigo-600]="newEmployee.status === 'On Leave'"
                      [class.border-indigo-600]="newEmployee.status === 'On Leave'"
                      [class.text-white]="newEmployee.status === 'On Leave'"
                      class="bg-slate-950 border border-slate-700 text-slate-300 py-2 rounded-xl text-xs font-semibold transition hover:bg-slate-800">
                On Leave
              </button>
            </div>
          </div> 
          
        </div>

        <div class="pt-4 border-t border-slate-850 flex justify-end space-x-3">
          <button type="button" 
                  (click)="closeModal()" 
                  class="bg-slate-800 hover:bg-slate-700 border border-slate-700 text-slate-300 px-5 py-2.5 rounded-xl text-sm font-medium transition">
            Cancel
          </button>
          <button type="submit" 
                  class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2.5 rounded-xl text-sm font-semibold shadow-lg shadow-indigo-500/20 transition">
            Save Profile
          </button>
        </div>
      </form>
    </div>
  </div>
}
