<div class="space-y-6">
  <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
    <div>
      <h2 class="text-2xl font-bold tracking-tight text-white">Employee Directory</h2>
      <p class="text-sm text-slate-400">Search, filter, and manage organizational talent.</p>
    </div>
    <button (click)="openAddModal()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2.5 px-4 rounded-xl shadow-lg transition flex items-center space-x-2">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
        <path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd" />
      </svg>
      <span>Onboard Employee</span>
    </button>
  </div>

  <!-- Filters Bar -->
<app-employee-filters
  [searchQuery]="searchQuery()"
  [selectedDepartment]="selectedDepartment()"
  [departments]="departments()">
</app-employee-filters>

  <!-- Employees Table -->
  <app-employee-table
  [employees]="filteredEmployees()"
  (viewPayslip)="viewPayslip($event)"
  (delete)="deleteEmployee($event)">
</app-employee-table>
</div>

<!-- MODAL: ADD EMPLOYEE -->
<app-add-employee-modal
  [isOpen]="isAddModalOpen()"
  (close)="closeAddModal()"
  (save)="addEmployee($event)">
</app-add-employee-modal>

<!-- MODAL: PAY SLIP DETAIL -->
<app-employee-payslip
  [employee]="selectedPayslipEmployee()"
  (close)="closePayslip()">
</app-employee-payslip>
